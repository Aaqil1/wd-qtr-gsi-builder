[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --cov=src/wd/qtr/gsi_builder --cov-report=html --cov-report=term-missing --cov-report=xml
markers =
    unit: Unit tests that do not require Spark
    spark: Tests that require Spark session
    integration: Integration tests
    string_conversion: Tests for string-to-integer conversion fixes
    performance: Performance and load tests
    comprehensive: Comprehensive test suites
    mandatory_fields: Tests for mandatory fields functionality
    config: Configuration and environment tests

[coverage:run]
source = src/wd/qtr/gsi_builder
omit =
    */tests/*
    */__init__.py
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
