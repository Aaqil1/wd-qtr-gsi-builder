services:
  onetax-redshift-local:
    image: postgres:16-alpine
    container_name: onetax-redshift-local
    environment:
      POSTGRES_DB: onetax
      POSTGRES_USER: onetax
      POSTGRES_PASSWORD: onetax
    ports:
      - "5439:5432"
    volumes:
      - onetax-redshift-data:/var/lib/postgresql/data
      - ./init/redshift:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onetax -d onetax"]
      interval: 5s
      timeout: 5s
      retries: 20

  onetax-metadata-local:
    image: postgres:16-alpine
    container_name: onetax-metadata-local
    environment:
      POSTGRES_DB: onetax_metadata
      POSTGRES_USER: onetax
      POSTGRES_PASSWORD: onetax
    ports:
      - "55432:5432"
    volumes:
      - onetax-metadata-data:/var/lib/postgresql/data
      - ./init/metadata:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onetax -d onetax_metadata"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  onetax-redshift-data:
  onetax-metadata-data:

